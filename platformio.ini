; Screen32 frontend integration/runtime project (ESP32 + web build target)

[platformio]
default_envs = JC8048W550C
lib_dir = lib

[env]
platform = espressif32
framework = arduino
extra_scripts = pre:extra_script.py

; Resolve screenLIB and LVGL from local submodules.
lib_extra_dirs =
    lib/screenLIB/lib
    lib/ScreenUI/vendor/lvgl-release-v9.4

lib_ignore = screenLIB
lib_deps =
    links2004/WebSockets @ ^2.6.1
    nanopb/Nanopb @ ^0.4.9

monitor_speed = 115200
monitor_rts = 0
monitor_dtr = 0
monitor_filters = esp32_exception_decoder

build_flags =
    -Ofast
    -Wall
    '-D BOARD_NAME="${this.board}"'
    '-D CORE_DEBUG_LEVEL=ARDUHAL_LOG_LEVEL_INFO'
    '-D LV_CONF_PATH="${PROJECT_DIR}/include/lv_conf.h"'
    -I${PROJECT_DIR}/src
    -I${PROJECT_DIR}

build_src_filter =
    +<*>
    -<platform_web/>

[env:JC8048W550C]
board = JC8048W550C
