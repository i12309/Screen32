; Minimal EEZ Studio + LVGL demo for Guition JC8048W550C (ESP32-S3, 800x480)
; Файл platformio.ini
; Назначение: конфигурация PlatformIO для ESP32-сборки и web-цели build_web.
; Структура проекта:
;   src/common_app/    - общий прикладной слой для ESP32 и Web
;   src/platform_esp32/ - платформенный слой ESP32
;   src/platform_web/   - платформенный слой Web (собирается CMake-целью)
;   src/ui/             - код UI, сгенерированный EEZ (read-only)

[platformio]
default_envs = JC8048W550C
lib_dir = lib

[env]
platform = espressif32
framework = arduino
extra_scripts = extra_script.py
lib_deps =
    links2004/WebSockets @ ^2.6.1

monitor_speed = 115200
monitor_rts = 0
monitor_dtr = 0
monitor_filters = esp32_exception_decoder

; Компилируем:
; - Arduino entry point (src/main.cpp)
; - общий app-слой (src/common_app/)
; - ESP32 платформенный слой (src/platform_esp32/)
; - сгенерированный EEZ UI (src/ui/)

build_flags =
    -Ofast
    -Wall
    '-D BOARD_NAME="${this.board}"'
    '-D CORE_DEBUG_LEVEL=ARDUHAL_LOG_LEVEL_INFO'
    '-D LV_CONF_PATH="${PROJECT_DIR}/include/lv_conf.h"'
    -I${PROJECT_DIR}/src
    -I${PROJECT_DIR}/src/screenlib
    -I${PROJECT_DIR}/src/third_party/nanopb
    -I${PROJECT_DIR}
    ; Если панель нестабильна/мерцает, можно раскомментировать:
    ; '-D ST7262_PANEL_CONFIG_TIMINGS_PCLK_HZ=(15400000)'

; Для ESP32 исключаем web-платформенный слой из src/.
build_src_filter =
    +<*>
    -<platform_web/>

; Используем локальные библиотеки из `lib/`:
; - lib/esp32-smartdisplay
; - lib/lvgl

[env:JC8048W550C]
board = JC8048W550C
